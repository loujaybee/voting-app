tasks:
    seed:
        name: Seed
        command: |
            docker-compose --profile seed up -d
        triggeredBy:
        - manual

services:
    start-app:
        name: Start App
        description: Start Docker Compose
        commands:
            start: |
                rm ~/.docker/config.json || true
                docker-compose up
        triggeredBy:
            - postEnvironmentStart